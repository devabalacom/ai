services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agenthub
      POSTGRES_USER: agenthub
      POSTGRES_PASSWORD: agenthub_dev_password
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build: .
    depends_on:
      - db
    environment:
      PORT: 3000
      DATABASE_URL: postgres://agenthub:agenthub_dev_password@db:5432/agenthub
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    depends_on:
      - api
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  db-data:
