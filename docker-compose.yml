services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agenthub
      POSTGRES_USER: agenthub
      POSTGRES_PASSWORD: agenthub_dev_password
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build: .
    depends_on:
      - db
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgres://agenthub:agenthub_dev_password@db:5432/agenthub
    restart: unless-stopped

volumes:
  db-data:
